name: CI

on: [push, pull_request]

jobs:
  test-efp-lite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    defaults:
      run:
        working-directory: ./efp-lite
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest --cov=efp_lite --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
          uses: codecov/codecov-action@v4
          with:
            files: ./efp-lite/coverage.xml
            flags: efp-lite
            name: efp-lite-coverage

  test-efp-fixtures:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    defaults:
      run:
        working-directory: ./efp-fixtures
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest --cov=efp_fixtures --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
          uses: codecov/codecov-action@v4
          with:
            files: ./efp-fixtures/coverage.xml
            flags: efp-fixtures
            name: efp-fixtures-coverage

  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate governance files
        run: |
          # Check if all required files exist
          required_files=("CODE_OF_CONDUCT.md" "CONTRIBUTING.md" "LICENSE" "SECURITY.md")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done
      
      - name: Validate GitHub templates
        run: |
          # Check if GitHub templates exist
          template_files=(".github/ISSUE_TEMPLATE/bug_report.md" ".github/ISSUE_TEMPLATE/feature_request.md" ".github/ISSUE_TEMPLATE/security_vulnerability.md" ".github/pull_request_template.md")
          for file in "${template_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing template file: $file"
              exit 1
            fi
            echo "✅ Found template: $file"
          done
